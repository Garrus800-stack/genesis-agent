name: Bug Report
description: Report a bug in Genesis Agent
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please fill out as much as you can — the more detail, the faster the fix.

  - type: input
    id: version
    attributes:
      label: Genesis Version
      description: "Run `node cli.js --version` or check package.json"
      placeholder: "e.g. 5.9.2"
    validations:
      required: true

  - type: dropdown
    id: backend
    attributes:
      label: LLM Backend
      options:
        - Ollama (local)
        - Anthropic (Claude)
        - OpenAI (GPT)
        - Multiple
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - Electron (Desktop)
        - CLI (Headless)
        - MCP Server
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: "Clear description of the bug."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: "What should have happened instead?"
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: "Minimal steps to trigger the bug."
      placeholder: |
        1. Start Genesis with `node cli.js --minimal`
        2. Type "..."
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error output / logs
      description: "Paste relevant console output. Use `--verbose` for full logs."
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: "OS, Node version, CPU/RAM if relevant"
      placeholder: |
        - OS: Windows 11 / macOS 15 / Ubuntu 24
        - Node: v22.x
        - Electron: 35.x
        - Model: qwen2.5:7b
