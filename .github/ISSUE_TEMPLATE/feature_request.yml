name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests are welcome. Be specific about what you need and why.

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: "What problem does this solve? Why is it needed?"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: "How should this work? Be as specific as possible."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: "Other approaches you've thought about."

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Core / Architecture
        - Cognitive Subsystems
        - MCP / Integration
        - CLI / Headless
        - Dashboard / UI
        - Skills / Plugins
        - Colony / Multi-Agent
        - Deployment
        - Documentation
        - Other
    validations:
      required: true
