  <circle class="writer-bg w-lesson" cx="340" cy="145" r="11"/>
  <circle class="writer-ring w-lesson" cx="340" cy="145" r="11"/>
  <circle class="writer-core w-lesson" cx="340" cy="145"/>
  <circle class="node-bg p4" cx="460" cy="115" r="6"/>
